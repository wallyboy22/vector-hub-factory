<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapBiomas Chatbot</title>
  <style>
    :root {
      --primary-color: #E8503A;
      --secondary-color: #555555;
      --bg-light: #fdfdfd;
      --chat-bg: #ffffff;
      --text-dark: #333333;
      --text-muted: #888888;
      --border-color: #eeeeee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-light);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: #ffffff;
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      border-bottom: 2px solid var(--primary-color);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { height: 32px; }
    .header-left h1 { font-size: 0.95rem; font-weight: 700; color: var(--secondary-color); color: #444; }

    /* TAB BAR + DOWNLOAD */
    .tab-bar-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fafafa;
      border-bottom: 1px solid var(--border-color);
      padding-right: 24px;
    }
    .tab-bar { display: flex; padding-left: 12px; }
    .tab {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      transition: 0.2s;
    }
    .tab:hover { color: var(--text-dark); }
    .tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
    .tab.active-cross { color: #00b4d8; border-bottom-color: #00b4d8; }

    .btn-download {
      background: transparent;
      color: var(--primary-color);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--primary-color);
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-download:hover { background: var(--primary-color); color: white; }

    #main-container { flex: 1; display: flex; overflow: hidden; }

    /* CHAT CONTAINER (25%) */
    #chat-container {
      width: 25%;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      border-right: 1px solid var(--border-color);
    }
    
    /* CHAT HISTORY */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #ffffff;
    }
    .msg-wrapper { display: flex; flex-direction: column; max-width: 92%; }
    .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.bot { align-self: flex-start; align-items: flex-start; }
    .msg {
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .msg.user { background: var(--primary-color); color: white; border-bottom-right-radius: 2px; }
    .msg.bot { background: #f5f5f5; color: var(--text-dark); border-bottom-left-radius: 2px; }

    /* BARRA DE AVISO E FERRAMENTAS */
    .disclaimer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: #fdfdfd;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }
    .disclaimer-text {
      font-size: 0.6rem;
      color: var(--text-muted);
      line-height: 1.2;
      max-width: 70%;
    }
    
    .disclaimer-tools { display: flex; align-items: center; gap: 6px; }
    
    #model-selector {
      font-size: 0.65rem;
      border: 1px solid #eee;
      padding: 3px 6px;
      border-radius: 4px;
      outline: none;
      color: var(--secondary-color);
      background: white;
      cursor: pointer;
    }
    #model-selector:hover { border-color: #ddd; }

    .btn-clear {
      background: transparent;
      border: 1px solid #eee;
      border-radius: 4px;
      cursor: pointer;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .btn-clear:hover { border-color: var(--primary-color); background: #fff5f3; }
    .btn-clear span { font-size: 0.85rem; }

    /* INPUT AREA */
    #input-area {
      padding: 12px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-row { display: flex; gap: 8px; }
    #question {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      resize: none;
    }
    #send-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      width: 42px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
    }

    /* PAINEL DE SUGESTÕES (Retrátil) */
    .suggestions-wrapper {
      background: #fafafa;
      border-top: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    .suggestions-header {
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .suggestions-header span { font-size: 0.62rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .suggestions-header .toggle-icon { transition: 0.3s; font-size: 0.75rem; color: #ccc; }
    
    #suggestions-container {
      padding: 0 12px 12px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      overflow-y: auto;
      max-height: 150px;
    }
    .suggestions-wrapper.minimized #suggestions-container { display: none; }
    .suggestions-wrapper.minimized .toggle-icon { transform: rotate(180deg); }

    .suggestion-chip {
      background: white;
      border: 1px solid var(--border-color);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.66rem;
      color: var(--secondary-color);
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
    }
    .suggestion-chip:hover { border-color: var(--primary-color); color: var(--primary-color); }

    /* PDF (75%) */
    #pdf-container { flex: 1; background: #525659; display: flex; flex-direction: column; }
    iframe { width: 100%; height: 100%; border: none; }

    /* FONTES E LINKS */
    .sources { margin-top: 10px; font-size: 0.72rem; display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid #eee; padding-top: 8px; }
    .page-link { background: #fff; color: var(--primary-color); padding: 2px 8px; border-radius: 10px; cursor: pointer; font-weight: 600; border: 1px solid var(--primary-color); }
    .page-link.active { background: var(--primary-color); color: #fff; box-shadow: 0 0 8px rgba(232, 80, 58, 0.4); }

    .btn-pdf-toggle {
      background: transparent; color: var(--secondary-color);
      border: 1px solid var(--border-color); border-radius: 4px;
      padding: 3px 6px; font-size: 0.65rem; font-weight: 600;
      cursor: pointer; transition: 0.2s;
    }
    .btn-pdf-toggle.active { background: var(--text-dark); color: white; border-color: var(--text-dark); }
    .btn-pdf-toggle:hover:not(.active) { background: #eee; }

    /* BOTÃO RETRY */
    .error-retry-btn {
      margin-top: 10px; background: white; color: var(--primary-color);
      border: 1px solid var(--primary-color); padding: 6px 12px;
      border-radius: 6px; font-size: 0.7rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img id="main-logo" src="/logo/raf" alt="MapBiomas Logo">
      <h1 id="header-title">MapBiomas Chat</h1>
    </div>
    <a href="/" class="btn-download">← Voltar</a>
  </header>

  <div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar"></div>
    <div class="pdf-controls" id="pdf-controls" style="display: flex; gap: 8px; align-items: center; justify-content: flex-end;">
      <div id="cross-pdf-toggles" style="display: none; gap: 6px;">
        <!-- Botões gerados via JS -->
      </div>
      <a id="btn-download" href="/pdf/raf" download class="btn-download" title="Baixar PDF">⬇️ PDF</a>
    </div>
  </div>
  
  <div id="main-container">
    <div id="chat-container">
      <div id="chat">
        <div class="msg-wrapper bot">
          <div class="msg bot">Olá! Selecione um relatório acima e comece a explorar.</div>
        </div>
      </div>

      <!-- BARRA DE AVISO E FERRAMENTAS -->
      <div class="disclaimer-bar">
        <div class="disclaimer-text">
          ⚠️ <b>IA Experimental</b>: Verifique fontes oficiais no PDF.
        </div>
        <div class="disclaimer-tools">
          <select id="model-selector" onchange="switchModel(this.value)" title="Escolher Cérebro da IA">
            <option value="flash">⚡ Flash</option>
            <option value="pro">🧠 Pro</option>
          </select>
          <button class="btn-clear" onclick="clearChat()" title="Limpar conversa">
            <span>🗑️</span>
          </button>
        </div>
      </div>

      <!-- INPUT AREA -->
      <div id="input-area">
        <div class="input-row">
          <textarea id="question" placeholder="Sua dúvida..." rows="1"></textarea>
          <button id="send-btn" onclick="sendQuestion()">➔</button>
        </div>
      </div>

      <!-- SUGESTÕES (RETRÁTIL) -->
      <div class="suggestions-wrapper" id="suggestions-wrapper">
        <div class="suggestions-header" onclick="toggleSuggestions()">
          <span>Sugestões de Perguntas</span>
          <div class="toggle-icon">▾</div>
        </div>
        <div id="suggestions-container"></div>
      </div>
    </div>

    <!-- PDF -->
    <div id="pdf-container">
      <iframe id="pdf-viewer" src="/pdf/raf#toolbar=0"></iframe>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('question');
    const btn = document.getElementById('send-btn');
    const pdfIframe = document.getElementById('pdf-viewer');
    const suggestions = document.getElementById('suggestions-container');
    const suggestionsWrapper = document.getElementById('suggestions-wrapper');
    const tabBar = document.getElementById('tab-bar');
    const btnDownload = document.getElementById('btn-download');
    const modelSelector = document.getElementById('model-selector');

    let currentReport = "raf";
    let currentModel = "flash";
    let reportsCache = {};
    let lastQuestion = "";

    let currentCrossPdf = "raf";

const questionBanks = {
      raf: [
        { label: "🇧🇷 Total Brasil", q: "Qual a área total queimada no Brasil em 2024?" },
        { label: "🐆 Pantanal", q: "Como o fogo se comportou no bioma Pantanal em 2024?" },
        { label: "🌿 Áreas Naturais", q: "Qual a área queimada em formações naturais e vegetação nativa?" },
        { label: "🌳 Amazônia", q: "Qual o impacto do fogo na Amazônia em 2024?" },
        { label: "🏹 Indígenas", q: "Existem dados sobre foco em terras indígenas e unidades de conservação?" },
        { label: "🌡️ Clima", q: "Qual a relação entre o clima e os números de fogo de 2024?" },
        { label: "📅 Mês de Pico", q: "Qual foi o mês em que o foco foi mais intenso?" }
      ],
      rad: [
        { label: "🇧🇷 Total Brasil", q: "Qual a área total desmatada no Brasil em 2023?" },
        { label: "📈 Tendência", q: "O desmatamento está aumentando ou diminuindo nos últimos anos?" },
        { label: "🚜 Agropecuária", q: "Qual a relação entre expansão agropecuária e desmatamento?" },
        { label: "🛡️ Proteção", q: "Qual foi o desmatamento dentro de Terras Indígenas e UCs?" },
        { label: "🗺️ Estados", q: "Quais estados lideraram o ranking de desmatamento?" },
        { label: "💾 Dados", q: "Quais as fontes de dados do MapBiomas Alerta?" }
      ],
      cross: [
        { label: "🔥 vs 🌳", q: "Como o fogo se relaciona com o desmatamento no Brasil?" },
        { label: "🛡️ Proteção", q: "Terras indígenas são mais protegidas do fogo ou do desmatamento?" },
        { label: "📊 Comparar", q: "Quais são as diferenças entre RAF e RAD em 2024?" }
      ]
    };

    async function initTabs() {
      try {
        const res = await fetch('/reports');
        reportsCache = await res.json();
        tabBar.innerHTML = '';
        const togglesContainer = document.getElementById('cross-pdf-toggles');
        togglesContainer.innerHTML = '';

        for (const [key, info] of Object.entries(reportsCache)) {
          const tab = document.createElement('div');
          tab.className = 'tab' + (key === currentReport ? ' active' : '');
          tab.textContent = `${info.emoji} ${info.short}`;
          tab.onclick = () => switchReport(key);
          tab.dataset.report = key;
          tabBar.appendChild(tab);

          // Popula também os botões de seleção de PDF da aba Cross
          const tgl = document.createElement('button');
          tgl.className = 'btn-pdf-toggle';
          tgl.id = `toggle-pdf-${key}`;
          tgl.textContent = info.short;
          tgl.onclick = () => showCrossPdf(key);
          togglesContainer.appendChild(tgl);
        }
        const crossTab = document.createElement('div');
        crossTab.className = 'tab' + (currentReport === 'cross' ? ' active' : '');
        crossTab.textContent = '🔍 Cross';
        crossTab.onclick = () => switchReport('cross');
        crossTab.dataset.report = 'cross';
        tabBar.appendChild(crossTab);
        updateTheme();
      } catch(e) { console.error(e); }
    }

    function updateTheme() {
      const info = reportsCache[currentReport];
      if(info && info.color) {
        document.documentElement.style.setProperty('--primary-color', info.color);
        document.getElementById('main-logo').src = `/logo/${currentReport}`;
      }
    }

    function switchReport(reportKey) {
      currentReport = reportKey;
      document.querySelectorAll('.tab').forEach(t => {
        const isActive = t.dataset.report === reportKey;
        t.classList.toggle('active', isActive);
        if (reportKey === 'cross') {
          t.classList.add('active-cross');
        } else {
          t.classList.remove('active-cross');
        }
      });
      
      if (reportKey === 'cross') {
        document.documentElement.style.setProperty('--primary-color', '#00b4d8');
        document.getElementById('cross-pdf-toggles').style.display = 'flex';
        showCrossPdf(currentCrossPdf || 'raf', null, true);
      } else {
        updateTheme();
        document.getElementById('cross-pdf-toggles').style.display = 'none';
        pdfIframe.style.display = 'flex';
        pdfIframe.src = `/pdf/${reportKey}?t=${new Date().getTime()}#toolbar=0`;
        btnDownload.style.display = 'inline-block';
        btnDownload.href = `/pdf/${reportKey}`;
      }
      
      chat.innerHTML = '';
      const label = reportKey === 'cross' ? 'Busca Transversal (RAF + RAD)' : reportsCache[reportKey].short;
      addMsg(`Modo alterado para ${label}.`, 'bot');
      renderSuggestions();
      openSuggestions();
    }

    function switchModel(val) { currentModel = val; modelSelector.value = val; }

    function autoRetryOtherModel() {
      const other = currentModel === "flash" ? "pro" : "flash";
      switchModel(other);
      input.value = lastQuestion;
      sendQuestion();
    }

    /* Sugestões */
    function toggleSuggestions() { suggestionsWrapper.classList.toggle('minimized'); }
    function openSuggestions() { suggestionsWrapper.classList.remove('minimized'); renderSuggestions(); }
    function minimizeSuggestions() { suggestionsWrapper.classList.add('minimized'); }

    function renderSuggestions() {
      const bank = questionBanks[currentReport] || [];
      suggestions.innerHTML = '';
      bank.forEach(item => {
        const chip = document.createElement('div');
        chip.className = 'suggestion-chip';
        chip.textContent = item.label;
        chip.title = item.q;
        chip.onclick = () => askSuggestion(item.q);
        suggestions.appendChild(chip);
      });
      if (currentReport === 'cross') {
        suggestionsWrapper.classList.remove('minimized');
      }
    }

    function showCrossPdf(docKey, page = null, forceSwitch = false) {
      currentCrossPdf = docKey;
      document.querySelectorAll('.btn-pdf-toggle').forEach(el => {
        el.classList.toggle('active', el.id === `toggle-pdf-${docKey}`);
      });
      pdfIframe.style.display = 'flex';
      btnDownload.style.display = 'inline-block';
      btnDownload.href = `/pdf/${docKey}`;
      const hash = page ? `#page=${page}&toolbar=0` : `#toolbar=0`;
      pdfIframe.src = `/pdf/${docKey}?t=${Date.now()}${hash}`;
    }

    initTabs();
    renderSuggestions();

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
    });

    function goToPage(page) {
      pdfIframe.src = `/pdf/${currentReport}?t=${new Date().getTime()}#page=${page}&toolbar=0&navpanes=0&scrollbar=1`;
      highlightActiveButtons(page);
    }

    function highlightActiveButtons(pageNo) {
      document.querySelectorAll('.page-link').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.page-link').forEach(el => {
        if (el.textContent.trim() == pageNo) el.classList.add('active');
      });
    }

    function clearChat() {
      chat.innerHTML = '';
      addMsg("Chat reiniciado.", "bot");
      openSuggestions();
    }

    function addMsg(text, role, sources, isQuotaError = false) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${role}`;
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
      
      if (isQuotaError) {
        const retryBtn = document.createElement('button');
        retryBtn.className = 'error-retry-btn';
        retryBtn.innerHTML = `🔄 Tentar com ${currentModel === "flash" ? "Pro" : "Flash"}`;
        retryBtn.onclick = () => autoRetryOtherModel();
        div.appendChild(retryBtn);
      }

      if (sources && sources.length) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        srcDiv.textContent = 'Págs: ';
        const uniqueSources = [];
        const seen = new Set();
        
        for (const s of sources) {
          const docKey = s.doc_key || s.doc || currentReport;
          const page = s.page;
          const key = `${docKey}|${page}`;
          if (!seen.has(key)) {
            seen.add(key);
            uniqueSources.push({ doc: docKey, page: page });
          }
        }
        
        uniqueSources.sort((a, b) => a.page - b.page);
        
        uniqueSources.forEach(s => {
          const span = document.createElement('span');
          span.className = 'page-link';
          const shortName = (reportsCache[s.doc] && reportsCache[s.doc].short) ? reportsCache[s.doc].short : s.doc.toUpperCase();
          span.textContent = `${shortName} p.${s.page}`;
          span.onclick = () => {
            if (currentReport === 'cross') {
              showCrossPdf(s.doc, s.page);
            } else {
              goToPage(s.page);
            }
          };
          srcDiv.appendChild(span);
        });
        div.appendChild(srcDiv);
      }
      
      wrapper.appendChild(div);
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
      if (role === 'user') minimizeSuggestions();
    }

    function askSuggestion(q) { input.value = q; sendQuestion(); }

    async function sendQuestion() {
      const q = input.value.trim();
      if (!q) return;
      lastQuestion = q;
      input.value = '';
      btn.disabled = true;
      addMsg(q, 'user');

      try {
        let res;
        if (currentReport === 'cross') {
          res = await fetch('/ask_cross', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ question: q, model: currentModel })
          });
        } else {
          res = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ question: q, report: currentReport, model: currentModel })
          });
        }
        const data = await res.json();
        
        if (data.answer) {
          addMsg(data.answer, 'bot', data.sources, data.error_type === 'QUOTA');
          
          if (currentReport !== 'cross' && data.sources?.length) {
            const firstPage = data.sources[0]?.page;
            if (firstPage) goToPage(firstPage);
          } else if (currentReport === 'cross' && data.sources?.length) {
            const firstSource = data.sources[0];
            const docKey = firstSource.doc_key || firstSource.doc || 'raf';
            const pageNum = firstSource.page || 1;
            showCrossPdf(docKey, pageNum);
          }
        }
      } catch(err) {
        console.error(err);
        addMsg('Erro na conexão.', 'bot');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
