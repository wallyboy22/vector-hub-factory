<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapBiomas Chatbot - RAF</title>
  <link rel="stylesheet" href="/assets/shared.css">
  <script src="/assets/config.js"></script>
  <style>
    :root {
      --primary-color: #E8503A;
      --secondary-color: #555555;
      --bg-light: #fdfdfd;
      --chat-bg: #ffffff;
      --text-dark: #333333;
      --text-muted: #888888;
      --border-color: #eeeeee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-light);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: #ffffff;
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      border-bottom: 2px solid var(--primary-color);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { height: 32px; }
    .header-left h1 { font-size: 0.95rem; font-weight: 700; color: var(--secondary-color); }

    .tab-bar-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fafafa;
      border-bottom: 1px solid var(--border-color);
      padding-right: 24px;
    }
    .tab-bar { display: flex; padding-left: 12px; gap: 4px; }
    .tab {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      transition: 0.2s;
    }
    .tab:hover { color: var(--text-dark); }
    .tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }

    .btn-download {
      background: transparent;
      color: var(--primary-color);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--primary-color);
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-download:hover { background: var(--primary-color); color: white; }

    #main-container { flex: 1; display: flex; overflow: hidden; }

    #chat-container {
      width: 30%;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      border-right: 1px solid var(--border-color);
    }
    
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #ffffff;
    }
    .msg-wrapper { display: flex; flex-direction: column; max-width: 92%; }
    .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.bot { align-self: flex-start; align-items: flex-start; }
    .msg {
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .msg.user { background: var(--primary-color); color: white; border-bottom-right-radius: 2px; }
    .msg.bot { background: #f5f5f5; color: var(--text-dark); border-bottom-left-radius: 2px; }

    .disclaimer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: #fdfdfd;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }
    .disclaimer-text {
      font-size: 0.6rem;
      color: var(--text-muted);
      line-height: 1.2;
    }
    
    .disclaimer-tools { display: flex; align-items: center; gap: 6px; }
    
    #model-selector {
      font-size: 0.65rem;
      border: 1px solid #eee;
      padding: 3px 6px;
      border-radius: 4px;
      outline: none;
      color: var(--secondary-color);
      background: white;
      cursor: pointer;
    }

    .btn-clear {
      background: transparent;
      border: 1px solid #eee;
      border-radius: 4px;
      cursor: pointer;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .btn-clear:hover { border-color: var(--primary-color); background: #fff5f3; }

    #input-area {
      padding: 12px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-row { display: flex; gap: 8px; }
    #question {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      resize: none;
    }
    #send-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      width: 42px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
    }

    .suggestions-wrapper {
      background: #fafafa;
      border-top: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    .suggestions-header {
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .suggestions-header span { font-size: 0.62rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .suggestions-header .toggle-icon { transition: 0.3s; font-size: 0.75rem; color: #ccc; }
    
    #suggestions-container {
      padding: 0 12px 12px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      overflow-y: auto;
      max-height: 150px;
    }
    .suggestions-wrapper.minimized #suggestions-container { display: none; }
    .suggestions-wrapper.minimized .toggle-icon { transform: rotate(180deg); }

    .suggestion-chip {
      background: white;
      border: 1px solid var(--border-color);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.66rem;
      color: var(--secondary-color);
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
    }
    .suggestion-chip:hover { border-color: var(--primary-color); color: var(--primary-color); }

    #pdf-container { flex: 1; background: #525659; display: flex; flex-direction: column; }
    iframe { width: 100%; height: 100%; border: none; }

    .sources { margin-top: 10px; font-size: 0.72rem; display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid #eee; padding-top: 8px; }
    .page-link { background: #fff; color: var(--primary-color); padding: 2px 8px; border-radius: 10px; cursor: pointer; font-weight: 600; border: 1px solid var(--primary-color); }
    .page-link.active { background: var(--primary-color); color: #fff; box-shadow: 0 0 8px rgba(232, 80, 58, 0.4); }

    .error-retry-btn {
      margin-top: 10px; background: white; color: var(--primary-color);
      border: 1px solid var(--primary-color); padding: 6px 12px;
      border-radius: 6px; font-size: 0.7rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
    }

    @media (max-width: 768px) {
      #chat-container { width: 100%; position: absolute; z-index: 5; height: 50%; }
      #pdf-container { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img id="main-logo" src="/assets/logo-raf.png" alt="MapBiomas Logo" onerror="this.style.display='none'">
      <h1>🔥 Relatório Anual do Fogo (RAF 2024)</h1>
    </div>
    <div>
      <a href="/" class="btn-download">← Voltar</a>
    </div>
  </header>

  <div class="tab-bar-container">
    <div class="tab-bar">
      <div class="tab active">🔥 RAF</div>
    </div>
    <a id="btn-download" href="/pdf/raf" download class="btn-download">⬇️ PDF Completo</a>
  </div>
  
  <div id="main-container">
    <div id="chat-container">
      <div id="chat">
        <div class="msg-wrapper bot">
          <div class="msg bot">Olá! Faça sua pergunta sobre o Relatório Anual do Fogo 2024.</div>
        </div>
      </div>

      <div class="disclaimer-bar">
        <div class="disclaimer-text">
          ⚠️ <b>IA Experimental</b>: Verifique fontes oficiais no PDF.
        </div>
        <div class="disclaimer-tools">
          <select id="model-selector" onchange="switchModel(this.value)">
            <option value="flash">⚡ Flash</option>
            <option value="pro">🧠 Pro</option>
          </select>
          <button class="btn-clear" onclick="clearChat()" title="Limpar conversa">
            <span>🗑️</span>
          </button>
        </div>
      </div>

      <div id="input-area">
        <div class="input-row">
          <textarea id="question" placeholder="Sua dúvida sobre o RAF..." rows="1"></textarea>
          <button id="send-btn" onclick="sendQuestion()">➔</button>
        </div>
      </div>

      <div class="suggestions-wrapper" id="suggestions-wrapper">
        <div class="suggestions-header" onclick="toggleSuggestions()">
          <span>Sugestões de Perguntas</span>
          <div class="toggle-icon">▾</div>
        </div>
        <div id="suggestions-container"></div>
      </div>
    </div>

    <div id="pdf-container">
      <iframe id="pdf-viewer" src="/pdf/raf#toolbar=0"></iframe>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('question');
    const btn = document.getElementById('send-btn');
    const pdfIframe = document.getElementById('pdf-viewer');
    const suggestions = document.getElementById('suggestions-container');
    const suggestionsWrapper = document.getElementById('suggestions-wrapper');
    const modelSelector = document.getElementById('model-selector');

    let currentModel = "flash";
    let currentReport = "raf";
    let currentPage = 1;
    let isLoading = false;

    // URLs da API (ajuste conforme seu deploy)
    const API_URL = window.VHF_CONFIG?.API_URL || 'http://localhost:8000';
    const WORKER_URL = window.VHF_CONFIG?.WORKER_URL || '';

    const questionBank = [
      { label: "🇧🇷 Total Brasil", q: "Qual a área total queimada no Brasil em 2024?" },
      { label: "🐆 Pantanal", q: "Como o fogo se comportou no bioma Pantanal em 2024?" },
      { label: "🌿 Áreas Naturais", q: "Qual a área queimada em formações naturais e vegetação nativa?" },
      { label: "🌳 Amazônia", q: "Qual o impacto do fogo na Amazônia em 2024?" },
      { label: "🏹 Indígenas", q: "Existem dados sobre fogo em terras indígenas e unidades de conservação?" },
      { label: "🌡️ Clima", q: "Qual a relação entre o clima e os números de fogo de 2024?" },
      { label: "📅 Mês de Pico", q: "Qual foi o mês em que o fogo foi mais intenso?" },
      { label: "📊 Comparativo", q: "Como 2024 se compara aos anos anteriores?" },
      { label: "🛢️ Petróleo", q: "Há registros de incêndio em áreas de petróleo?" },
      { label: "🔥 Fogo Cruzado", q: "O que é fogo cruzamento e onde ocorre?" }
    ];

    function renderSuggestions() {
      suggestions.innerHTML = '';
      questionBank.forEach(item => {
        const chip = document.createElement('div');
        chip.className = 'suggestion-chip';
        chip.textContent = item.label;
        chip.title = item.q;
        chip.onclick = () => askSuggestion(item.q);
        suggestions.appendChild(chip);
      });
    }

    function toggleSuggestions() { suggestionsWrapper.classList.toggle('minimized'); }
    function openSuggestions() { suggestionsWrapper.classList.remove('minimized'); }
    function minimizeSuggestions() { suggestionsWrapper.classList.add('minimized'); }

    function switchModel(val) { 
      currentModel = val; 
      modelSelector.value = val; 
    }

    function goToPage(page) {
      currentPage = page;
      pdfIframe.src = `${API_URL}/pdf/${currentReport}?t=${new Date().getTime()}#page=${page}&toolbar=0&navpanes=0`;
      highlightActivePage(page);
    }

    function highlightActivePage(pageNo) {
      document.querySelectorAll('.page-link').forEach(el => {
        el.classList.toggle('active', parseInt(el.textContent) === pageNo);
      });
    }

    function clearChat() {
      chat.innerHTML = '';
      addMsg("Chat reiniciado.", "bot");
      openSuggestions();
    }

    function addMsg(text, role, sources = []) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${role}`;
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
      
      if (sources && sources.length) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        srcDiv.textContent = 'Págs: ';
        const uniquePages = [...new Set(sources.map(s => s.page))].sort((a,b) => a-b);
        uniquePages.forEach(p => {
          const span = document.createElement('span');
          span.className = 'page-link';
          span.textContent = p;
          span.onclick = () => goToPage(p);
          srcDiv.appendChild(span);
        });
        div.appendChild(srcDiv);
      }
      
      wrapper.appendChild(div);
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
      if (role === 'user') minimizeSuggestions();
    }

    function askSuggestion(q) { input.value = q; sendQuestion(); }

    async function sendQuestion() {
      const q = input.value.trim();
      if (!q || isLoading) return;
      
      isLoading = true;
      input.value = '';
      btn.disabled = true;
      btn.textContent = '...';
      addMsg(q, 'user');

      try {
        // Primeiro, buscar no índice local
        const searchRes = await fetch(`${API_URL}/search`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ 
            question: q, 
            report: currentReport, 
            model: currentModel 
          })
        });
        
        const searchData = await searchRes.json();
        
        if (searchData.answer) {
          addMsg(searchData.answer, 'bot', searchData.sources);
          if (searchData.sources?.[0]?.page) {
            goToPage(searchData.sources[0].page);
          }
        } else {
          addMsg("Desculpe, não encontrei informações relevantes no relatório.", "bot");
        }
      } catch(err) {
        console.error(err);
        addMsg("Erro de conexão. Tente novamente.", "bot");
      } finally {
        isLoading = false;
        btn.disabled = false;
        btn.textContent = '➔';
        input.focus();
      }
    }

    // Init
    renderSuggestions();

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
    });
  </script>
</body>
</html>
