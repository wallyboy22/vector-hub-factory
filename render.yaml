services:
  - type: web
    name: vector-hub-factory
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: HUGGINFACE_API_KEY
        sync: false
      - key: OPENCODE_ZEN_API_KEY
        sync: false
      - key: DEV_MODE
        value: "false"
        sync: false