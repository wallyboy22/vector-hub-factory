name: Deploy GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Copy HTMLs to public
        run: |
          cp ui/vitrine/index.html public/index.html
          cp -r ui/chatbot-raf public/chatbot-raf || true
          cp -r ui/chatbot-rad public/chatbot-rad || true
          cp -r ui/multi public/multi || true
          cp -r ui/cross public/cross || true
          mkdir -p public/assets
          cp ui/assets/*.css public/assets/ 2>/dev/null || true
          cp ui/assets/*.js public/assets/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4